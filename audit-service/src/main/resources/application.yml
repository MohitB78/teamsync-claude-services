server:
  port: 9097
  # SECURITY: Prevent stack trace and error message disclosure
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: teamsync-audit-service

  # Spring Cloud Config Client
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"
  cloud:
    config:
      enabled: ${CONFIG_ENABLED:true}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
    bus:
      enabled: ${BUS_ENABLED:true}
      destination: platform.config.bus

  # MongoDB config for audit log mirror (fast queries)
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI}
    auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: audit-service-group
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.teamsync.common.event,com.teamsync.audit.dto
        isolation.level: read_committed

# ImmuDB Configuration

audit:
  immudb:
    host: ${IMMUDB_HOST}
    port: ${IMMUDB_PORT}
    database: ${IMMUDB_DATABASE}
    username: ${IMMUDB_USERNAME}
    password: ${IMMUDB_PASSWORD}
    state-folder: ${IMMUDB_STATE_FOLDER}
    tls:
      enabled: ${IMMUDB_TLS_ENABLED}
  mongodb-sync:
    enabled: true
    collection: auditdb
  verification:
    hash-chain-enabled: true
  retention:
    enabled: true
    default-period: 365d
    truncation-frequency: 24h
    min-retention-period: 30d
    max-retention-period: 2555d
  # High-value event filtering
  high-value-events:
    actions:
      - DELETE
      - PERMISSION_CHANGE
      - SHARE
    include-failures: true
    include-denied: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:development}

logging:
  level:
    root: INFO
    com.teamsync: DEBUG
    io.codenotary.immudb4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker profile - uses environment variables from docker-compose
spring:
  config:
    activate:
      on-profile: docker

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
