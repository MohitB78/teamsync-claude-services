# =============================================================================
# Railway Profile Configuration for TeamSync Audit Service
# =============================================================================
# Most configuration is fetched from Config Server (application-railway.yml).
# MongoDB credentials are managed by Vault (dynamic secrets with 1-hour TTL).
# Service-specific config: teamsync/teamsync-audit-service.yml in config-repo
# Shared MongoDB config: teamsync/application.yml (Vault role: teamsync-shared)
# =============================================================================

server:
  port: ${PORT:9097}

spring:
  application:
    name: teamsync-audit-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}

  cloud:
    config:
      enabled: true
      fail-fast: false
      # URI must be set alongside import for credentials to be transmitted
      uri: ${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:}
      retry:
        initial-interval: 1000
        max-attempts: 3
        max-interval: 5000
        multiplier: 1.5
    bus:
      enabled: false

  # MongoDB credentials are provided by Config Server (from Vault)
  # No hardcoded credentials - Config Server injects dynamic credentials

  # Service-specific Kafka consumer group
  kafka:
    consumer:
      group-id: audit-service

# ImmuDB configuration for Railway
# Note: ImmuDB will need to be deployed as a separate service on Railway
# Set IMMUDB_ENABLED=true once ImmuDB is deployed
teamsync:
  audit:
    immudb:
      enabled: ${IMMUDB_ENABLED:false}
      host: ${IMMUDB_HOST:teamsync-immudb.railway.internal}
      port: ${IMMUDB_PORT:3322}
      database: ${IMMUDB_DATABASE:teamsync_audit}
      username: ${IMMUDB_USERNAME:immudb}
      password: ${IMMUDB_PASSWORD:immudb}
      state-folder: /var/lib/teamsync/immudb-state
      tls:
        enabled: ${IMMUDB_TLS_ENABLED:false}
