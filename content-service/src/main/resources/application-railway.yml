# =============================================================================
# Railway Profile Configuration for TeamSync Content Service
# =============================================================================
# MongoDB credentials come from SPRING_MONGODB_URI environment variable
# IMPORTANT: Spring Boot 4 renamed spring.data.mongodb.uri to spring.mongodb.uri
# Config Server provides additional shared configuration
# Last updated: 2025-12-16 - Fixed Spring Boot 4 MongoDB property + security conflict
# =============================================================================

server:
  port: ${PORT:9081}

spring:
  application:
    name: teamsync-content-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}

  cloud:
    config:
      enabled: true
      fail-fast: false
      # URI must be set alongside import for credentials to be transmitted
      uri: ${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:}
      retry:
        initial-interval: 1000
        max-attempts: 3
        max-interval: 5000
        multiplier: 1.5
    bus:
      enabled: false

  # MongoDB - Spring Boot 4 uses spring.mongodb.uri (not spring.data.mongodb.uri)
  # Environment variable: SPRING_MONGODB_URI
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/teamsync}

  # Data configuration (MongoDB and Redis)
  data:
    # MongoDB Connection Pool Settings
    # PERFORMANCE: Enables connection pooling for improved throughput and reduced latency
    # Note: Connection pool is configured via MongoClientSettingsBuilderCustomizer bean
    mongodb:
      auto-index-creation: true
    # Redis configuration for access tracking
    # REDIS_URL format: redis://default:<password>@<host>:<port>
    # PERFORMANCE FIX: Increased pool size from 8 to 50 to prevent pool exhaustion
    # under concurrent load. Previous value caused request timeouts.
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5s
      connect-timeout: 5s
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  # Service-specific Kafka consumer group
  kafka:
    consumer:
      group-id: content-service

# Service-specific settings
teamsync:
  content:
    # Download URLs are rewritten by frontend to go through portal.teamsync.link proxy
    # so content-service doesn't need public ingress - use internal URL
    service-url: ${CONTENT_SERVICE_URL:http://teamsync-content-service.railway.internal:9081}
  # Disable base security config - this service has its own SecurityConfig
  security:
    use-base-config: false
  kafka:
    topics:
      content-events: teamsync.content.events

management:
  health:
    redis:
      enabled: true
