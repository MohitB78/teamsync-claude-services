server:
  port: 9097
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: teamsync-signing-service

  # Spring Cloud Config Client
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"
  cloud:
    config:
      enabled: ${CONFIG_ENABLED:true}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
    bus:
      enabled: ${BUS_ENABLED:true}
      destination: platform.config.bus

  # MongoDB
  data:
    mongodb:
      auto-index-creation: true

  # Security - OAuth2 Resource Server (Zitadel) for internal endpoints
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER:http://localhost:8085}
          jwk-set-uri: ${ZITADEL_ISSUER:http://localhost:8085}/oauth/v2/keys

  # Kafka Configuration (Redpanda on Railway)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:redpanda.railway.internal:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# OpenTelemetry Configuration
otel:
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      timeout: ${OTEL_EXPORTER_OTLP_TIMEOUT:10000}
  traces:
    sampler:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  environment: ${ENVIRONMENT:development}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:development}
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}

logging:
  level:
    root: INFO
    com.teamsync: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# TeamSync Signing Service Configuration
teamsync:
  signing:
    # Token settings for signing links
    token:
      secret: ${SIGNING_TOKEN_SECRET:CHANGE_ME_IN_PRODUCTION_32_CHARS_MIN}
      expiry-days: ${SIGNING_TOKEN_EXPIRY_DAYS:7}
    # Download link validity after completion
    download:
      expiry-days: ${SIGNING_DOWNLOAD_EXPIRY_DAYS:30}
    # Reminder settings
    reminder:
      enabled: ${SIGNING_REMINDER_ENABLED:true}
      days-before-expiry: 2,1
  # Inter-service communication
  content-service:
    url: ${CONTENT_SERVICE_URL:http://localhost:9081}
  storage-service:
    url: ${STORAGE_SERVICE_URL:http://localhost:9083}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:9091}

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

