# =============================================================================
# Railway Profile Configuration for TeamSync Sharing Service
# =============================================================================
# Most configuration is fetched from Config Server (application-railway.yml).
# MongoDB credentials are managed by Vault (dynamic secrets with 1-hour TTL).
# Service-specific config: teamsync/teamsync-sharing-service.yml in config-repo
# Shared MongoDB config: teamsync/application.yml (Vault role: teamsync-shared)
# =============================================================================

server:
  port: ${PORT:9084}

spring:
  application:
    name: teamsync-sharing-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}

  cloud:
    config:
      enabled: true
      fail-fast: false
      # URI must be set alongside import for credentials to be transmitted
      uri: ${CONFIG_SERVER_URI:http://config-server.railway.internal:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:}
      retry:
        initial-interval: 1000
        max-attempts: 3
        max-interval: 5000
        multiplier: 1.5
    bus:
      enabled: false

  # MongoDB credentials are provided by Config Server (from Vault)
  # No hardcoded credentials - Config Server injects dynamic credentials

  # Service-specific Kafka consumer group
  kafka:
    consumer:
      group-id: sharing-service

# Service-specific settings
teamsync:
  security:
    use-base-config: false  # This service has its own SecurityConfig
  services:
    permission-manager: ${PERMISSION_MANAGER_SERVICE_URL:http://teamsync-permission-manager-service.railway.internal:9096}
  kafka:
    topics:
      sharing-events: teamsync.sharing.events
