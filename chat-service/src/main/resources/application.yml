server:
  port: 9090
  # SECURITY FIX (Round 8): Prevent stack trace and error message disclosure
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: teamsync-chat-service

  # Spring Cloud Config Client
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"
  cloud:
    config:
      enabled: ${CONFIG_ENABLED:true}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
    bus:
      enabled: ${BUS_ENABLED:true}
      destination: platform.config.bus

  # MongoDB config is in profile-specific files (application-railway.yml)
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Security - OAuth2 Resource Server (Zitadel)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER:http://localhost:8085}
          jwk-set-uri: ${ZITADEL_ISSUER:http://localhost:8085}/oauth/v2/keys

  # Kafka Configuration (Redpanda on Railway)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:redpanda.railway.internal:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: chat-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.teamsync.*

# Chat service configuration
teamsync:
  security:
    use-base-config: false
  chat:
    message-retention-days: 365
    max-message-length: 10000

# OpenTelemetry Configuration (OTel SDK 1.58.0 - January 2026)
# See: https://opentelemetry.io/docs/languages/java/configuration/
otel:
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      timeout: ${OTEL_EXPORTER_OTLP_TIMEOUT:10000}
  traces:
    sampler:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  bsp:
    schedule:
      delay: ${OTEL_BSP_SCHEDULE_DELAY:5000}
    max:
      queue:
        size: ${OTEL_BSP_MAX_QUEUE_SIZE:2048}
      export:
        batch:
          size: ${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:512}
  environment: ${ENVIRONMENT:development}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:development}
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}

# Logging
logging:
  level:
    root: INFO
    com.teamsync: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://admin:password@accessarc-mongodb:27017/teamsync?authSource=admin}

  data:
    redis:
      host: ${REDIS_HOST:accessarc-redis}
      port: 6379

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:teamsync-redpanda:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER:http://teamsync-zitadel:8080}
          jwk-set-uri: ${ZITADEL_ISSUER:http://teamsync-zitadel:8080}/oauth/v2/keys
