# Test profile configuration for API Gateway integration tests
server:
  port: 0  # Random port for tests

spring:
  application:
    name: teamsync-api-gateway-test

  # Disable cloud config for tests
  cloud:
    config:
      enabled: false
    bus:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false

  # Use in-memory session for tests (no Redis dependency)
  session:
    store-type: none

  # Security - Mock JWT validation (Zitadel test endpoints)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18085
          jwk-set-uri: http://localhost:18085/oauth/v2/keys

# Circuit breaker - fast fail for tests
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 5
        minimumNumberOfCalls: 2
        permittedNumberOfCallsInHalfOpenState: 1
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 2s
        failureRateThreshold: 50

  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

# Disable actuator endpoints for tests
management:
  endpoints:
    web:
      exposure:
        include: health

# Logging - minimal for tests
logging:
  level:
    root: WARN
    com.teamsync: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.security: WARN

# Test configuration
teamsync:
  gateway:
    dynamic-routes:
      enabled: false
    minio:
      internal-url: http://localhost:19000
      host: localhost:19000

  # BFF configuration for tests
  bff:
    enabled: true
    session:
      cookie-name: TEAMSYNC_SESSION
      cookie-max-age: 1h
      cookie-secure: false
      cookie-same-site: Lax
      cookie-http-only: true
      redis-namespace: teamsync:test:session
    csrf:
      enabled: false  # Disable CSRF for tests
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
      exclude-patterns:
        - /api/**
        - /wopi/**
        - /bff/auth/**
    zitadel:
      authorization-uri: http://localhost:18085/oauth/v2/authorize
      token-uri: http://localhost:18085/oauth/v2/token
      user-info-uri: http://localhost:18085/oidc/v1/userinfo
      logout-uri: http://localhost:18085/oidc/v1/end_session
      jwks-uri: http://localhost:18085/oauth/v2/keys
      client-id: teamsync-bff-test
      connection-timeout-seconds: 5
      read-timeout-seconds: 10
    pkce:
      enabled: true
      redirect-uri: http://localhost:9080/bff/auth/callback
      post-logout-redirect-uri: http://localhost:3000/auth/login
      frontend-login-url: http://localhost:3000
      frontend-logout-url: http://localhost:3000/auth/login
      scope: openid email profile

  # Test service URLs (pointing to mock servers)
  services:
    content-service: http://localhost:19081
    storage-service: http://localhost:19083
    sharing-service: http://localhost:19084
    team-service: http://localhost:19085
    project-service: http://localhost:19086
    workflow-execution-service: http://localhost:19087
    trash-service: http://localhost:19088
    search-service: http://localhost:19089
    chat-service: http://localhost:19090
    notification-service: http://localhost:19091
    activity-service: http://localhost:19092
    wopi-service: http://localhost:19093
    settings-service: http://localhost:19094
    presence-service: http://localhost:19095
    permission-manager-service: http://localhost:19096
