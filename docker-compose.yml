    environment:
      SERVER_PORT: 9096
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://admin:password@accessarc-mongodb:27017/teamsync_permissions?authSource=admin
      SPRING_DATA_REDIS_HOST: accessarc-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      # Permission cache settings
      PERMISSION_CACHE_TTL_MINUTES: 5
      PERMISSION_CACHE_NEGATIVE_TTL_MINUTES: 1
    depends_on:
      redpanda:
        condition: service_healthy
    # Note: accessarc-mongodb and accessarc-redis are external services
    networks:
