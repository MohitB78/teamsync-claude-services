      KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      ZITADEL_ISSUER: http://teamsync-zitadel:8080
      MINIO_ENDPOINT: http://teamsync-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      STORAGE_PROVIDER: minio
      # Public URL prefix for presigned URLs - routes through API Gateway proxy
      # Presigned URLs will be rewritten from http://teamsync-minio:9000/... to http://teamsync-api-gateway:9080/storage-proxy/...
      STORAGE_PUBLIC_URL: http://teamsync-api-gateway:9080/storage-proxy
      # Permission Manager Service for RBAC
      TEAMSYNC_PERMISSION_MANAGER_URL: http://teamsync-permission-manager-service:9096
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      permission-manager-service:
        condition: service_healthy
    # Note: accessarc-mongodb is an external service
    networks:
