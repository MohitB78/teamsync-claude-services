# ==============================================
# TeamSync Backend Docker Compose
# ==============================================
# This file orchestrates all TeamSync backend services
# NOTE: Uses shared infrastructure (MongoDB, Redis, Zitadel)
# Build: docker-compose build
# Start: docker-compose up -d
# Stop: docker-compose down
# Logs: docker-compose logs -f <service-name>
# ==============================================

services:
  # ============================================
  # Infrastructure Services (TeamSync-specific only)
  # MongoDB, Redis are shared from AccessArc
  # Zitadel runs separately in docker-compose.zitadel.yml
  # ============================================

  minio:
    image: minio/minio:latest
    container_name: teamsync-minio
    restart: unless-stopped
    # NOTE: Port 9000 (S3 API) is NOT exposed externally
    # All storage requests go through API Gateway's /storage-proxy/* route
    # Only console port 9001 is exposed for admin access
    expose:
      - "9000"  # Internal only - accessible by other containers
    ports:
      - "9001:9001"  # Admin console only
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - teamsync-minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda - Kafka-compatible streaming platform (lighter, faster, no ZooKeeper/KRaft)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    container_name: teamsync-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://teamsync-redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://teamsync-redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr teamsync-redpanda:33145
      - --advertise-rpc-addr teamsync-redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --default-log-level=info
    ports:
      - "19092:19092"  # Kafka API (external)
      - "18081:18081"  # Schema Registry (external)
      - "18082:18082"  # Pandaproxy/REST API (external)
      - "9644:9644"    # Admin API
    volumes:
      - teamsync-redpanda-data:/var/lib/redpanda/data
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: teamsync-elasticsearch
    restart: unless-stopped
    ports:
      - "9201:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - xpack.monitoring.collection.enabled=false
      - xpack.watcher.enabled=false
      - ingest.geoip.downloader.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - teamsync-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ImmuDB - Immutable Database for Tamper-Proof Audit Logs
  # Version: 1.10.0 (Latest stable as of Oct 2024)
  # Port: 3322 (gRPC API)
  # Documentation: https://docs.immudb.io
  immudb:
    image: codenotary/immudb:1.10.0
    container_name: teamsync-immudb
    restart: unless-stopped
    ports:
      - "3322:3322"   # gRPC API
      - "9497:9497"   # Metrics (Prometheus)
      - "8088:8080"   # Web console (different port to avoid conflict)
    environment:
      IMMUDB_ADMIN_PASSWORD: ${IMMUDB_ADMIN_PASSWORD:-immudb}
      IMMUDB_DIR: /var/lib/immudb
    volumes:
      - teamsync-immudb-data:/var/lib/immudb
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "immuadmin", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # TeamSync Microservices
  # ============================================

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: teamsync/api-gateway:latest
    container_name: teamsync-api-gateway
    restart: unless-stopped
    ports:
      - "9080:9080"
    environment:
      SERVER_PORT: 9080
      SPRING_PROFILES_ACTIVE: docker
      # OAuth2 Resource Server - Zitadel (internal Docker network)
      ZITADEL_ISSUER: http://teamsync-zitadel:8080
      ZITADEL_URL: http://teamsync-zitadel:8080
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID:-}
      # Redis for session storage
      SPRING_DATA_REDIS_HOST: accessarc-redis
      SPRING_DATA_REDIS_PORT: 6379
      # BFF Configuration - Zitadel is INTERNAL ONLY (not exposed to browser)
      BFF_ENABLED: "true"
      ZITADEL_CLIENT_ID: teamsync-bff
      # PKCE Configuration - Authorization Code Flow
      BFF_REDIRECT_URI: http://localhost:9080/bff/auth/callback
      BFF_POST_LOGOUT_URI: http://localhost:3001/auth/login
      FRONTEND_URL: http://localhost:3001
      FRONTEND_LOGOUT_URL: http://localhost:3001/auth/login
      # Session Cookie Configuration
      BFF_COOKIE_SECURE: "false"
      # MinIO proxy configuration - routes /storage-proxy/* to MinIO
      MINIO_INTERNAL_URL: http://teamsync-minio:9000
      MINIO_HOST: teamsync-minio:9000
      GATEWAY_PUBLIC_URL: http://localhost:9080
      # Service URIs for Docker networking (uses container hostnames)
      TEAMSYNC_SERVICES_CONTENT_SERVICE: http://teamsync-content-service:9081
      TEAMSYNC_SERVICES_STORAGE_SERVICE: http://teamsync-storage-service:9083
      TEAMSYNC_SERVICES_SHARING_SERVICE: http://teamsync-sharing-service:9084
      TEAMSYNC_SERVICES_TEAM_SERVICE: http://teamsync-team-service:9085
      TEAMSYNC_SERVICES_PROJECT_SERVICE: http://teamsync-project-service:9086
      TEAMSYNC_SERVICES_WORKFLOW_EXECUTION_SERVICE: http://teamsync-workflow-execution-service:9087
      TEAMSYNC_SERVICES_TRASH_SERVICE: http://teamsync-trash-service:9088
      TEAMSYNC_SERVICES_SEARCH_SERVICE: http://teamsync-search-service:9089
      TEAMSYNC_SERVICES_CHAT_SERVICE: http://teamsync-chat-service:9090
      TEAMSYNC_SERVICES_NOTIFICATION_SERVICE: http://teamsync-notification-service:9091
      TEAMSYNC_SERVICES_ACTIVITY_SERVICE: http://teamsync-activity-service:9092
      TEAMSYNC_SERVICES_WOPI_SERVICE: http://teamsync-wopi-service:9093
      TEAMSYNC_SERVICES_SETTINGS_SERVICE: http://teamsync-settings-service:9094
      TEAMSYNC_SERVICES_PRESENCE_SERVICE: http://teamsync-presence-service:9095
      TEAMSYNC_SERVICES_PERMISSION_MANAGER_SERVICE: http://teamsync-permission-manager-service:9096
    depends_on:
      minio:
        condition: service_healthy
    # Note: teamsync-zitadel and accessarc-redis are external services
    networks:
      - teamsync-network

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    image: teamsync/content-service:latest
    container_name: teamsync-content-service
    restart: unless-stopped
    ports:
      - "9081:9081"
    environment:
      SERVER_PORT: 9081
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://admin:password@accessarc-mongodb:27017/teamsync?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      ZITADEL_ISSUER: http://teamsync-zitadel:8080
      MINIO_ENDPOINT: http://teamsync-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Permission Manager Service for RBAC
      TEAMSYNC_PERMISSION_MANAGER_URL: http://teamsync-permission-manager-service:9096
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      permission-manager-service:
        condition: service_healthy
    # Note: accessarc-mongodb is an external service
    networks:
      - teamsync-network

