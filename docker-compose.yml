    build:
      context: .
      dockerfile: audit-service/Dockerfile
    image: teamsync/audit-service:latest
    container_name: teamsync-audit-service
    restart: unless-stopped
    ports:
      - "9097:9097"
    environment:
      SERVER_PORT: 9097
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@accessarc-mongodb:27017/teamsync?authSource=admin
      SPRING_DATA_REDIS_HOST: accessarc-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      KAFKA_BOOTSTRAP_SERVERS: teamsync-redpanda:9092
      ZITADEL_ISSUER: http://teamsync-zitadel:8080
      # ImmuDB Configuration
      IMMUDB_HOST: teamsync-immudb
      IMMUDB_PORT: 3322
      IMMUDB_DATABASE: teamsync_audit
      IMMUDB_USERNAME: immudb
      IMMUDB_PASSWORD: immudb
      IMMUDB_STATE_FOLDER: /var/lib/teamsync/immudb-state
    volumes:
      - teamsync-audit-state:/var/lib/teamsync/immudb-state
    depends_on:
      immudb:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9097/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================
# Networks
# ============================================
networks:
  teamsync-network:
    external: true
    name: teamsync-network

# ============================================
# Volumes (TeamSync-specific only)
# MongoDB and Redis volumes are managed by AccessArc
# ============================================
volumes:
  teamsync-minio-data:
    name: teamsync-minio-data
  teamsync-redpanda-data:
    name: teamsync-redpanda-data
  teamsync-elasticsearch-data:
    name: teamsync-elasticsearch-data
  teamsync-immudb-data:
    name: teamsync-immudb-data
  teamsync-audit-state:
    name: teamsync-audit-state
